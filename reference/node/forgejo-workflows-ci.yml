name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: docker
    container:
      image: code.forgejo.org/oci/node:24-bookworm
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: "Guard: agent step not yet completed for this PR"
        run: test ! -f .standards/pending.json

      - run: pnpm run --if-present lint

      - run: pnpm run --if-present format:check

      - run: pnpm run --if-present typecheck

      - run: pnpm run --if-present build

      - run: pnpm run --if-present test

      # minimum-release-age=0 mirrors the apply invocation in renovate-config/standards.json:
      # pnpm 11 defaults minimumReleaseAge to 1440 (24h), so without the bypass `check`
      # resolves the newest standards older than a day while the stamp was written by apply
      # against the true latest — a freshly released version then reads as false drift.
      - run: pnpm --config.minimum-release-age=0 dlx @sebastian-software/standards check
